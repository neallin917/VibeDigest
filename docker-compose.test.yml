services:
  transcriber-backend-test:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: transcriber-backend-test
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - ./temp:/app/temp:rw
      - ./downloads:/app/downloads:rw
    # Override start command if needed, or keep same
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env.production
      - .env.test.local
    environment:
      - PORT=8000 # Internal container port remains 8000
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      # Test Router (Different Subdomain)
      - "traefik.http.routers.transcriber-test.rule=Host(`test-transcriber.neallin.xyz`)"
      - "traefik.http.routers.transcriber-test.entrypoints=web"
      - "traefik.http.services.transcriber-test.loadbalancer.server.port=8000"

networks:
  traefik:
    external: true
