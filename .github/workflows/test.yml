name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r backend/requirements-dev.txt
        echo "=== Debug Dependencies ==="
        pip list
        python -c "import sqlalchemy; print(f'SQLAlchemy version: {sqlalchemy.__version__}')"

    - name: Run Linting
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        ruff check backend --select=E9,F63,F7,F82 --target-version=py310
        # Exit with zero even if there are errors, to treat as warnings for now
        ruff check backend --exit-zero

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
    - name: Run tests
      env:
        SUPABASE_URL: "https://example.supabase.co"
        SUPABASE_SERVICE_KEY: "dummy-key"
        OPENAI_API_KEY: "dummy-key"
        RESEND_API_KEY: "dummy-key"
        TEST_DATABASE_URL: "postgresql://postgres:test@localhost:5432/postgres"
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd)/backend
        pytest -c backend/pytest.ini backend

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    - name: Install dependencies
      run: npm install
    - name: Run tests
      run: npm test
