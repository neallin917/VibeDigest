services:
  backend-prod:
    # build section REMOVED for prod
    image: transcriber-backend:prod
    # container_name REMOVED for project referencing
    restart: always
    # ---------------------------------------------------------
    # PRODUCTION MODE - For online users via Cloudflare Tunnel
    # ---------------------------------------------------------
    # No volume sync for code (code baked into image)
    volumes:
      - ./temp:/app/temp
      - ./downloads:/app/downloads
    ports:
      # Prod uses 16080 (Cloudflare Tunnel points here)
      - "16080:8000"
    # Run WITHOUT reload
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    # ---------------------------------------------------------
    env_file:
      - .env
      - .env.local
    environment:
      - WHISPER_MODEL_SIZE=${WHISPER_MODEL_SIZE:-base}
      # FORCE PROD SETTINGS (Override .env)
      - MOCK_MODE=false
      - CHAT_MOCK_MODE=false
      - LOG_LEVEL=INFO
      - RELOAD=false
    networks:
      - traefik

    labels:
      - "traefik.enable=true"
      # Router - Online users access via this domain
      - "traefik.http.routers.transcriber.rule=Host(`transcriber.neallin.xyz`)"
      - "traefik.http.routers.transcriber.entrypoints=web"
      # Service
      - "traefik.http.services.transcriber.loadbalancer.server.port=8000"

networks:
  traefik:
    external: true
