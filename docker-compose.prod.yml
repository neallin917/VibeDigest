services:
  backend-prod:
    # Use pre-built image (from make release-prod)
    image: transcriber-backend:prod
    # container_name removed for project referencing logic
    restart: always

    # ---------------------------------------------------------
    # PRODUCTION MODE - For online users via Cloudflare Tunnel
    # ---------------------------------------------------------
    # No volume sync for code (code baked into image)
    volumes:
      - ./temp:/app/temp
      - ./downloads:/app/downloads

    ports:
      # Prod uses 16080 (Cloudflare Tunnel points here)
      - "16080:8000"

    # Run WITHOUT reload
    command: uvicorn main:app --host 0.0.0.0 --port 8000

    # ---------------------------------------------------------
    env_file:
      - .env
      - .env.local

    environment:
      - WHISPER_MODEL_SIZE=${WHISPER_MODEL_SIZE:-base}
      # FORCE PROD SETTINGS (Override .env)
      - MOCK_MODE=false
      - CHAT_MOCK_MODE=false
      - LOG_LEVEL=INFO
      # LLM SETTINGS (Prod uses OpenAI)
      - LLM_PROVIDER=openai
      - OPENAI_BASE_URL=https://api.openai.com/v1
      - OPENAI_API_KEY=${PROD_OPENAI_API_KEY}

    # Healthcheck to ensure container is ready
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    networks:
      - traefik

    labels:
      - "traefik.enable=true"
      # Router - Online users access via this domain
      - "traefik.http.routers.transcriber.rule=Host(`vibedigest.io`)"
      - "traefik.http.routers.transcriber.entrypoints=web"
      # Service
      - "traefik.http.services.transcriber.loadbalancer.server.port=8000"

networks:
  traefik:
    external: true
