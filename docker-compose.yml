services:
  backend-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: transcriber-backend:dev
    restart: unless-stopped
    # ---------------------------------------------------------
    # DEV MODE - For local Vibe Coding only
    # ---------------------------------------------------------
    volumes:
      # Sync source code instantly. Editing 'backend' folder updates container.
      - ./backend:/app
      # Persist downloads and temp if needed (or keep ephemeral)
      - ./temp:/app/temp
      - ./downloads:/app/downloads
    ports:
      # Dev uses 16081 to avoid conflict with Prod (16080)
      - "16081:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    # ---------------------------------------------------------
    env_file:
      - ./backend/.env
    environment:
      - WHISPER_MODEL_SIZE=${WHISPER_MODEL_SIZE:-base}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # No Traefik labels - Dev is NOT exposed to internet

  langgraph-server:
    build:
      context: ./backend
      dockerfile: Dockerfile.langgraph
    # container_name removed
    restart: unless-stopped
    ports:
      - "${LANGGRAPH_PORT}:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/deps/backend
    environment:
      - LANGGRAPH_CONTAINER_PORT=8000
      - LANGGRAPH_API_URL=http://localhost:${LANGGRAPH_PORT}
      - BACKEND_API_URL=http://localhost:16081
      - POSTGRES_URI=postgresql://postgres:password@postgres:5432/langgraph
      - REDIS_URI=redis://redis:6379
      - PYTHONPATH=/deps/backend
      - LANGSERVE_GRAPHS={"agent":"agent.chat_graph:graph","dummy":"dummy_graph:graph"}
    env_file:
      - .env
      - ./backend/.env

  postgres:
    image: postgres:16
    # container_name removed
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: langgraph
    ports:
      - "15432:5432"
    volumes:
      - langgraph_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    # container_name removed
    ports:
      - "16379:6379"
    restart: unless-stopped

volumes:
  langgraph_postgres_data:
