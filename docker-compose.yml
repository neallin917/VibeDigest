services:
  vibe-digest:
    build: .
    ports:
      - "16080:16080"
    env_file:
      - ./ai-video-transcriber.env
    environment:
      # 必需：OpenAI API密钥（请在.env文件中设置或直接修改）
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      # 可选：自定义OpenAI端点
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      # 可选：Whisper模型大小
      - WHISPER_MODEL_SIZE=${WHISPER_MODEL_SIZE:-base}
      # 服务器配置
      - HOST=0.0.0.0
      - PORT=16080
      # volumes:
      # 挂载临时文件目录，便于查看和管理下载的文件  
      # - ./temp:/app/temp
    restart: unless-stopped

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.transcriber.rule=Host(`transcriber.neallin.xyz`)"
      - "traefik.http.routers.transcriber.entrypoints=web"
      - "traefik.http.services.transcriber.loadbalancer.server.port=16080"
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - traefik

networks:
  traefik:
    external: true
