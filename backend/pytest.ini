[pytest]
pythonpath = .
testpaths = tests
python_files = test_*.py
asyncio_mode = auto
filterwarnings =
    ignore::DeprecationWarning
markers =
    integration: calls real external services (OpenAI, Supabase, video download) - excluded from default run
    slow: takes more than 5s - excluded from default run
addopts = --cov=. --cov-report=term-missing --cov-report=html --cov-fail-under=50 -m "not integration and not slow"