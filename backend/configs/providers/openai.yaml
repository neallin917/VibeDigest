provider: openai
display_name: OpenAI
base_url_env: OPENAI_BASE_URL
api_key_env: OPENAI_API_KEY
defaults:
  smart: gpt-5
  fast: gpt-5-mini
models:
  - id: gpt-5
    label: GPT-5
    capabilities: [chat, structured, reasoning]
  - id: gpt-5-mini
    label: GPT-5-mini
    capabilities: [chat, structured]
  - id: gpt-4o
    label: GPT-4o
    capabilities: [chat, structured]
  - id: gpt-4o-mini
    label: GPT-4o-mini
    capabilities: [chat, structured]
  - id: whisper-1
    label: Whisper-1
    capabilities: [transcription]
